name: CI

# Gác cổng lint -> test -> build cho cả 2 phía (NFR-007).
on:
  push:
  pull_request:

jobs:
  api:
    name: API (Go) lint + test
    runs-on: ubuntu-latest
    # CGO_ENABLED=0: testcontainers chạy pure-Go được; đồng nhất với make test/lint
    # trên máy dev (shim cc). Runner ubuntu-latest có sẵn Docker → testcontainers
    # tự spin Postgres:16 cho integration test (KHÔNG cần service container).
    env:
      CGO_ENABLED: "0"
      # KHÔNG set GOTOOLCHAIN=local ở CI: runner ephemeral, để auto tải toolchain
      # go.mod/tool yêu cầu (golangci-lint build cần Go mới hơn). Local thì dùng make (đã pin).
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # go.mod yêu cầu 1.25 (testcontainers-go v0.43). Dùng đúng go.mod.
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: go vet
        run: go vet ./...

      # Cài + chạy golangci-lint trực tiếp (không dùng golangci-lint-action@v6 —
      # action v6 dành cho golangci-lint v1, xử lý sai config schema v2 dù pin version v2).
      # Chạy y hệt `make lint` local (CGO_ENABLED=0 đã ở env job) để CI khớp local 1:1.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run

      - name: go test
        run: go test ./... -count=1

  web:
    name: Web (Next.js) typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Generate API types (contract gate)
        run: npm run gen:api

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
