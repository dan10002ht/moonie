openapi: 3.0.3
info:
  title: Mooni Cake API
  description: >-
    Hợp đồng API chính thức của Mooni Cake (spec-first). Mọi endpoint nghiệp vụ
    thêm ở giai đoạn sau đều phải khai báo tại đây trước khi implement.
  version: 0.1.0
servers:
  - url: /api/v1
    description: Base path của toàn bộ API (REQ, SRS Quyết định §5)
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Health check
      description: Trả về trạng thái sống của service. Không chạm DB.
      responses:
        "200":
          description: Service khỏe mạnh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /products:
    get:
      operationId: listProducts
      summary: Danh sách sản phẩm public
      description: >-
        Trả về sản phẩm đang hiển thị (ẩn status='hidden'), sắp theo thứ tự hiển
        thị. Public, không cần auth (REQ-PROD-001).
      responses:
        "200":
          description: Danh sách sản phẩm
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /leads:
    post:
      operationId: createLead
      summary: Tạo lead từ form liên hệ
      description: >-
        Nhận dữ liệu form liên hệ public, validate (tên, SĐT Việt Nam, độ dài) và
        lưu lead trạng thái 'new'. Có rate limit theo IP để chống spam
        (REQ-LEAD-001/002/003, NFR-004).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead đã được tạo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadCreated"
        "400":
          description: Dữ liệu vào không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Gửi quá nhiều yêu cầu (rate limit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/login:
    post:
      operationId: login
      summary: Đăng nhập admin
      description: >-
        Xác thực admin bằng email + password (bcrypt). Đúng → đặt JWT trong cookie
        httpOnly `mc_admin` (SameSite=Lax, Secure ở production) và trả {ok:true}.
        Sai email HOẶC sai mật khẩu → 401 với cùng một thông điệp (chống dò tài
        khoản). KHÔNG có đăng ký public (REQ-AUTH-001/002/003).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Đăng nhập thành công (kèm Set-Cookie mc_admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400":
          description: Dữ liệu vào không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Email hoặc mật khẩu không đúng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      summary: Đăng xuất admin
      description: Xóa cookie phiên `mc_admin` (Max-Age=-1). Luôn trả 200.
      responses:
        "200":
          description: Đã đăng xuất
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
  /admin/me:
    get:
      operationId: getAdminMe
      summary: Thông tin admin đang đăng nhập
      description: >-
        Trả admin tương ứng phiên hiện tại (đọc từ JWT qua middleware auth). Dùng
        để web biết đã đăng nhập. Thiếu/sai cookie → 401 (REQ-AUTH-002).
      responses:
        "200":
          description: Thông tin admin hiện tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Chưa đăng nhập hoặc phiên không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/leads:
    get:
      operationId: listAdminLeads
      summary: Danh sách leads cho admin (phân trang)
      description: >-
        Trả về leads phân trang, mới nhất trước (ORDER BY created_at DESC, id).
        limit mặc định 20, tối đa 100 (vượt bị kẹp về 100); offset mặc định 0.
        Trả {items, total}. Cần auth admin (REQ-LEAD-004).
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Danh sách leads + tổng số
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/leads/{id}:
    patch:
      operationId: updateLeadStatus
      summary: Cập nhật trạng thái lead
      description: >-
        Đổi trạng thái lead (new | contacted | converted | closed). Trạng thái
        không hợp lệ → 400, không tìm thấy → 404. Cần auth admin (REQ-LEAD-004).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadStatusInput"
      responses:
        "200":
          description: Đã cập nhật trạng thái
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Trạng thái không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/leads/{id}/convert:
    post:
      operationId: convertLead
      summary: Convert lead thành đơn nháp
      description: >-
        Tạo đơn NHÁP (status='new', tổng tiền 0) từ lead trong cùng transaction:
        lấy tên/SĐT/lời nhắn lead ghi vào order.note, kênh map từ lead.source,
        KHÔNG tạo customer (order.customer_id NULL). Đánh dấu lead.status='converted'
        + lead.order_id. Sau commit bắn Telegram thông báo đơn mới (fail-safe).
        Lead đã convert → 409. Cần auth admin (REQ-LEAD-005, REQ-NOTI-002).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Đã tạo đơn nháp từ lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvertLeadResult"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Lead đã được convert trước đó
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/orders:
    get:
      operationId: listAdminOrders
      summary: Danh sách đơn hàng cho admin (phân trang)
      description: >-
        Trả về đơn hàng phân trang, mới nhất trước (ORDER BY created_at DESC, id).
        limit mặc định 20, tối đa 100 (vượt bị kẹp về 100); offset mặc định 0.
        Trả {items, total}. Cần auth admin (REQ-ORD-001).
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Danh sách đơn hàng + tổng số
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createOrder
      summary: Tạo đơn hàng (nhập tay)
      description: >-
        Tạo đơn + order_items TRONG một transaction (REQ-ORD-003). Với mỗi dòng
        lấy sản phẩm theo product_id để SNAPSHOT product_name + unit_price (giá
        hiện tại) (REQ-ORD-004). subtotal = Σ(unit_price×quantity), total =
        subtotal − discount. Sinh mã đơn MC-YYYYMMDD-xxxx. Sau commit bắn Telegram
        thông báo đơn mới (fail-safe). items rỗng / quantity ≤ 0 / discount vượt
        subtotal → 400; product_id không tồn tại → 400 (rollback toàn bộ). Cần auth
        admin (REQ-ORD-001/003/004, REQ-NOTI-002).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Đã tạo đơn hàng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCreated"
        "400":
          description: Dữ liệu vào không hợp lệ (items rỗng, quantity ≤ 0, discount vượt subtotal, product không tồn tại)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/orders/{id}:
    get:
      operationId: getAdminOrder
      summary: Chi tiết đơn hàng + các dòng
      description: >-
        Trả chi tiết một đơn kèm mảng items (snapshot product_name/unit_price/
        quantity tại thời điểm đặt). Không tìm thấy → 404. Cần auth admin
        (REQ-ORD-001/004).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chi tiết đơn hàng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy đơn hàng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateOrderStatus
      summary: Cập nhật trạng thái đơn hàng
      description: >-
        Đổi trạng thái đơn (new | confirmed | delivering | done | cancelled)
        (REQ-ORD-002). Trạng thái không hợp lệ → 400. Đơn ở trạng thái kết thúc
        (done/cancelled) KHÔNG được đổi sang trạng thái khác → 400. Không tìm thấy
        → 404. Cần auth admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusInput"
      responses:
        "200":
          description: Đã cập nhật trạng thái
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Trạng thái không hợp lệ hoặc chuyển trạng thái không cho phép
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy đơn hàng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products:
    get:
      operationId: listAdminProducts
      summary: Danh sách sản phẩm cho admin (gồm cả hidden)
      description: >-
        Trả về TẤT CẢ sản phẩm kể cả status='hidden', sắp tất định theo
        display_order rồi created_at rồi id. Cần auth admin (REQ-PROD-002).
      responses:
        "200":
          description: Danh sách sản phẩm (gồm hidden)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createProduct
      summary: Tạo sản phẩm mới
      description: >-
        Tạo sản phẩm. Validate: name không rỗng, slug không rỗng, price ≥ 0,
        type ∈ {gift_box, single_cake}, status ∈ {available, sold_out, hidden}.
        Slug trùng → 409. Cần auth admin (REQ-PROD-002).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Đã tạo sản phẩm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Dữ liệu vào không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Slug đã tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products/{id}:
    put:
      operationId: updateProduct
      summary: Cập nhật sản phẩm
      description: >-
        Cập nhật toàn bộ thuộc tính sản phẩm theo id. Validate như tạo mới.
        Slug trùng → 409, không tìm thấy → 404. Cần auth admin (REQ-PROD-002).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Đã cập nhật sản phẩm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Dữ liệu vào không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy sản phẩm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Slug đã tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProduct
      summary: Xóa (ẩn) sản phẩm
      description: >-
        Xóa MỀM: đặt status='hidden' (an toàn hơn xóa cứng vì order_items tham
        chiếu product_id). Cần auth admin (REQ-PROD-002).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Đã ẩn sản phẩm (soft delete)
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy sản phẩm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products/{id}/image:
    post:
      operationId: uploadProductImage
      summary: Upload ảnh sản phẩm
      description: >-
        Nhận file ảnh (multipart/form-data, field tên "file"), validate loại
        (image/png|jpeg|webp) và kích thước (≤ 5MB), lưu vào thư mục uploads/ và
        đặt products.image_url = "/uploads/<file>". Cần auth admin (REQ-PROD-003).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Đã upload ảnh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageUploadResult"
        "400":
          description: File không hợp lệ (thiếu, sai loại, quá lớn)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Không tìm thấy sản phẩm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Product:
      type: object
      required:
        - id
        - slug
        - name
        - price
        - type
        - status
        - display_order
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: integer
          format: int64
          description: Giá VND, số nguyên
        type:
          type: string
          enum:
            - gift_box
            - single_cake
        status:
          type: string
          enum:
            - available
            - sold_out
            - hidden
        image_url:
          type: string
          nullable: true
        badge:
          type: string
          nullable: true
          description: Nhãn marketing (vd "Bán chạy", "Mới"), null nếu không có
        compare_at_price:
          type: integer
          format: int64
          nullable: true
          description: Giá gốc để so sánh (VND). Nếu > price → hiện giá gạch + % giảm. Null nếu không khuyến mãi.
        subtitle:
          type: string
          nullable: true
          description: Nhãn phân loại nhỏ in hoa trên tên (vd "Hộp thiếc cao cấp"), null nếu không có
        display_order:
          type: integer
    ProductInput:
      type: object
      required:
        - slug
        - name
        - price
        - type
        - status
      properties:
        slug:
          type: string
          description: Định danh URL (duy nhất). Trùng → 409.
        name:
          type: string
          description: Tên sản phẩm (bắt buộc, không rỗng)
        description:
          type: string
          nullable: true
        price:
          type: integer
          format: int64
          description: Giá VND, số nguyên ≥ 0
        type:
          type: string
          description: Loại sản phẩm. Hợp lệ- gift_box | single_cake
        status:
          type: string
          description: Trạng thái. Hợp lệ- available | sold_out | hidden
        image_url:
          type: string
          nullable: true
        badge:
          type: string
          nullable: true
        compare_at_price:
          type: integer
          format: int64
          nullable: true
        subtitle:
          type: string
          nullable: true
        display_order:
          type: integer
          nullable: true
          description: Thứ tự hiển thị (mặc định 0 nếu bỏ trống)
    ImageUploadResult:
      type: object
      required:
        - image_url
      properties:
        image_url:
          type: string
          description: Đường dẫn public của ảnh, vd "/uploads/<uuid>.png"
    LeadInput:
      type: object
      required:
        - name
        - phone
      properties:
        name:
          type: string
          description: Tên khách hàng (bắt buộc)
        phone:
          type: string
          description: Số điện thoại Việt Nam (bắt buộc)
        message:
          type: string
          nullable: true
          description: Lời nhắn
        product_interest:
          type: string
          nullable: true
          description: Sản phẩm khách quan tâm
    LeadCreated:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
    Lead:
      type: object
      required:
        - id
        - name
        - phone
        - source
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        message:
          type: string
          nullable: true
        product_interest:
          type: string
          nullable: true
        source:
          type: string
          description: Nguồn lead (website | phone | zalo | fb | ...)
        status:
          type: string
          enum:
            - new
            - contacted
            - converted
            - closed
        created_at:
          type: string
          format: date-time
        order_id:
          type: string
          format: uuid
          nullable: true
          description: Đơn đã convert từ lead này (null nếu chưa convert)
    LeadList:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
          format: int64
          description: Tổng số lead (không phân trang)
    LeadStatusInput:
      type: object
      required:
