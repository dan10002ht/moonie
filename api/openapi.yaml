openapi: 3.0.3
info:
  title: Mooni Cake API
  description: >-
    Hợp đồng API chính thức của Mooni Cake (spec-first). Mọi endpoint nghiệp vụ
    thêm ở giai đoạn sau đều phải khai báo tại đây trước khi implement.
  version: 0.1.0
servers:
  - url: /api/v1
    description: Base path của toàn bộ API (REQ, SRS Quyết định §5)
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Health check
      description: Trả về trạng thái sống của service. Không chạm DB.
      responses:
        "200":
          description: Service khỏe mạnh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /products:
    get:
      operationId: listProducts
      summary: Danh sách sản phẩm public
      description: >-
        Trả về sản phẩm đang hiển thị (ẩn status='hidden'), sắp theo thứ tự hiển
        thị. Public, không cần auth (REQ-PROD-001).
      responses:
        "200":
          description: Danh sách sản phẩm
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
components:
  schemas:
    Product:
      type: object
      required:
        - id
        - slug
        - name
        - price
        - type
        - status
        - display_order
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: integer
          format: int64
          description: Giá VND, số nguyên
        type:
          type: string
          enum:
            - gift_box
            - single_cake
        status:
          type: string
          enum:
            - available
            - sold_out
            - hidden
        image_url:
          type: string
          nullable: true
        display_order:
          type: integer
    Health:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
