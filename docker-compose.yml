services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mooni
      POSTGRES_PASSWORD: mooni
      POSTGRES_DB: mooni
    ports: ["5440:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mooni"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Trong mạng compose, API nối Postgres qua service name `postgres:5432`
      # (khác host port 5440). Secrets lấy từ .env (không commit — NFR-005).
      DATABASE_URL: postgres://mooni:mooni@postgres:5432/mooni?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PORT: "8080"
    ports: ["8080:8080"]

  web:
    build: ./web
    depends_on:
      - api
    environment:
      # Client-side dùng http://localhost:8080 (truy cập từ trình duyệt trên host).
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080/api/v1}
    ports: ["3000:3000"]

volumes:
  pgdata:
