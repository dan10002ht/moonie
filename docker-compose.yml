services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mooni
      POSTGRES_PASSWORD: mooni
      POSTGRES_DB: mooni
    ports: ["5440:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mooni"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
